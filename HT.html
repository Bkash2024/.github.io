<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Habit Tracker Pro</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary-color: #6366f1;
            --text-color: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --today-highlight: #f59e0b;
            --delete-color: #ef4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-color); color: var(--text-color); padding: 20px; transition: 0.3s; }
        .container { max-width: 900px; margin: 0 auto; }

        /* Header & Nav */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .nav-controls { display: flex; align-items: center; gap: 15px; background: var(--card-bg); padding: 8px 16px; border-radius: 12px; box-shadow: var(--shadow); }
        .nav-btn { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 5px 10px; border-radius: 6px; cursor: pointer; }

        /* Input Section */
        .input-card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 30px; }
        .input-row { display: flex; gap: 12px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-color); }
        input[type="color"] { width: 50px; height: 45px; border: none; background: none; cursor: pointer; }

        /* Habit Cards */
        .habit-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        .habit-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .streak-badge { background: #fef3c7; color: #92400e; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        
        /* The Grid */
        .grid-container { overflow-x: auto; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; min-width: 300px; }
        .day { aspect-ratio: 1; border: 2px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; transition: 0.2s; position: relative; }
        .day:hover { transform: translateY(-2px); }
        .day.today { border-color: var(--today-highlight); font-weight: 900; }
        .day.empty { visibility: hidden; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-danger { background: none; color: var(--delete-color); font-size: 0.8rem; }

        @media (max-width: 600px) { .input-row { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>My Habits</h1>
            <p style="color: var(--text-secondary)">Track your consistency</p>
        </div>
        <div class="nav-controls">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <span id="monthDisplay" style="min-width: 120px; text-align: center; font-weight: 600;"></span>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            <button class="nav-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
    </header>

    <div class="input-card">
        <div class="input-row">
            <input type="text" id="habitInput" placeholder="Enter a new habit...">
            <input type="color" id="colorInput" value="#6366f1">
            <button class="btn btn-primary" onclick="addHabit()">Add Habit</button>
        </div>
    </div>

    <div id="habitList"></div>
</div>

<script>
    let habits = JSON.parse(localStorage.getItem('habits_v2')) || [];
    let viewDate = new Date();

    function init() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        render();
    }

    function addHabit() {
        const name = document.getElementById('habitInput').value.trim();
        const color = document.getElementById('colorInput').value;
        if (!name) return;

        habits.push({
            id: Date.now(),
            name,
            color,
            completions: {} // Format: "YYYY-MM-DD": true
        });

        document.getElementById('habitInput').value = '';
        save();
    }

    function toggleDay(habitId, dateStr) {
        const habit = habits.find(h => h.id === habitId);
        if (habit.completions[dateStr]) {
            delete habit.completions[dateStr];
        } else {
            habit.completions[dateStr] = true;
        }
        save();
    }

    function calculateStreak(completions) {
        let streak = 0;
        let checkDate = new Date();
        checkDate.setHours(0,0,0,0);

        // If today isn't done, check starting from yesterday
        const todayStr = checkDate.toISOString().split('T')[0];
        if (!completions[todayStr]) {
            checkDate.setDate(checkDate.getDate() - 1);
        }

        while (true) {
            const s = checkDate.toISOString().split('T')[0];
            if (completions[s]) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            } else {
                break;
            }
        }
        return streak;
    }

    function render() {
        const list = document.getElementById('habitList');
        const monthDisplay = document.getElementById('monthDisplay');
        list.innerHTML = '';

        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        monthDisplay.innerText = viewDate.toLocaleDateString('default', { month: 'long', year: 'numeric' });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];

        habits.forEach(habit => {
            const currentStreak = calculateStreak(habit.completions);
            const card = document.createElement('div');
            card.className = 'habit-card';
            
            let gridHtml = '';
            for (let i = 0; i < firstDay; i++) gridHtml += '<div class="day empty"></div>';
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dStr = dateObj.toISOString().split('T')[0];
                const isDone = habit.completions[dStr];
                const isToday = dStr === todayStr;
                
                gridHtml += `
                    <div class="day ${isDone ? 'done' : ''} ${isToday ? 'today' : ''}" 
                         style="${isDone ? `background: ${habit.color}; color: white; border-color: ${habit.color}` : ''}"
                         onclick="toggleDay(${habit.id}, '${dStr}')">
                        ${d}
                    </div>`;
            }

            card.innerHTML = `
                <div class="habit-info">
                    <div>
                        <h3 style="color: ${habit.color}">${habit.name}</h3>
                        <p style="font-size: 0.8rem; color: var(--text-secondary)">Consistency is key</p>
                    </div>
                    <div style="text-align: right">
                        <div class="streak-badge">🔥 ${currentStreak} Day Streak</div>
                        <button class="btn btn-danger" onclick="deleteHabit(${habit.id})">Delete</button>
                    </div>
                </div>
                <div class="grid-container">
                    <div class="grid">${gridHtml}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function deleteHabit(id) {
        if(confirm('Delete this habit?')) {
            habits = habits.filter(h => h.id !== id);
            save();
        }
    }

    function changeMonth(dir) {
        viewDate.setMonth(viewDate.getMonth() + dir);
        render();
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const target = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', target);
        localStorage.setItem('theme', target);
    }

    function save() {
        localStorage.setItem('habits_v2', JSON.stringify(habits));
        render();
    }

    init();
</script>
</body>
</html>
